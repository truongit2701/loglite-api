version: '3.8'

services:
  # --- Database ---
  mongodb:
    image: mongo:latest
    container_name: loglite-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - loglite-network

  # --- API Server ---
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loglite-api
    restart: always

    expose:
      - "3001"

    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/loglite
      - PORT=3001
      - JWT_SECRET=loglite_prod_998877_ultra_secure_secret

    depends_on:
      - mongodb
    networks:
      - loglite-network

  # --- Caddy (HTTPS + Reverse Proxy) ---
  caddy:
    image: caddy:latest
    container_name: loglite-caddy
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - server
    networks:
      - loglite-network

networks:
  loglite-network:
    driver: bridge

volumes:
  mongodb_data:
  caddy_data:
  caddy_config: